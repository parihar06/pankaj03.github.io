<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan & Pay</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #000000, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        img {
            width: 250px;
            margin-top: 20px;
            border-radius: 10px;
        }

        a {
            display: block;
            margin-top: 20px;
            color: #00f2fe;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Scan & Pay ₹10</h2>
        <p>Use PhonePe / UPI</p>

        <!-- IMPORTANT: Image must be in root folder -->
        <img src="qr.pankaj.png" alt="QR Code">

        <a href="index.html">⬅ Back</a>
    </div>

</body>
</html>
